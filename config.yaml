# Fraud Auto-Research Configuration
# Set these values before launching the autonomous loop.
# The agent reads this but does not modify it.

# --- Data source ---
# Option 1: Local parquet files (for IEEE-CIS evaluation or offline work)
local_data:
  enabled: true                       # Set false to use BigQuery instead
  data_dir: "./data"                  # Directory containing parquet files
  prefix: "raw"                       # File prefix: raw_train.parquet, raw_val.parquet, raw_oot.parquet

# Option 2: BigQuery connection (for production use)
bigquery:
  project: ""                        # GCP project ID
  dataset: ""                        # BigQuery dataset
  source_table: ""                   # Base transaction table or view
  cache_dir: "./data_cache"          # Local parquet cache directory
  max_rows: 5000000                  # Safety limit per split

# Segment targeting — edit to focus on different populations
segment:
  name: "all_transactions"           # Human-readable segment name
  filter_sql: "1=1"                  # WHERE clause fragment (BigQuery mode only)

# Fraud type — select label column for sub-type targeting
fraud_type:
  name: "all"                        # all, ato, cnp, first_party, synthetic
  label_column: "label"              # Binary label column (already 'label' in prepared data)

# Date ranges (BigQuery mode only — local mode uses pre-split files)
dates:
  train_start: "2024-01-01"
  train_end: "2024-09-30"
  val_start: "2024-10-01"
  val_end: "2024-11-30"
  oot_start: "2024-12-01"
  oot_end: "2025-01-31"

# Metrics and composite score configuration
metrics:
  target_recall: 0.80                # Fixed recall for precision@ metric
  composite_weights:
    auprc: 0.50                      # Weight for AUPRC
    precision_at_recall: 0.30        # Weight for precision@recall
    psi_penalty: 0.20               # Weight for PSI stability penalty
  psi_threshold: 0.20               # PSI below this = no penalty
  psi_hard_reject: 0.25             # PSI above this = auto reject
  min_improvement: 0.001            # Ignore improvements smaller than this

# Feature validation thresholds
validation:
  max_nan_rate: 0.50                 # Max 50% NaN per feature (IEEE-CIS has high nulls)
  max_feature_explosion: 5.0         # Max 5x base feature count
  max_feature_count: 300             # Absolute max features
  max_correlation: 0.98              # Flag feature pairs above this

# Execution limits
execution:
  timeout_seconds: 900               # 15 min max per experiment
  bq_timeout_seconds: 300            # 5 min max for BQ query

# Benchmarks (for reference — do not modify)
# Full-feature XGBoost (all 431 columns):  AUPRC = 0.4982
# Raw-feature XGBoost (55 columns):        AUPRC = 0.2588
# Gap to close through feature engineering: 0.2394
