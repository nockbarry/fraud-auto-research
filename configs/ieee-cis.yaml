# IEEE-CIS Fraud Detection — Vesta CNP transactions, derived features stripped
dataset_name: "ieee-cis"
features_file: "datasets/ieee_cis/features.py"
model_file: "datasets/ieee_cis/model.py"
dataset_description: "Vesta CNP fraud, 590K txns, V/C/D/M derived features stripped to 55 raw columns"

local_data:
  enabled: true
  data_dir: "./data"
  prefix: "raw"

bigquery:
  project: ""
  dataset: ""
  source_table: ""
  cache_dir: "./data_cache"
  max_rows: 5000000

segment:
  name: "all_transactions"
  filter_sql: "1=1"

fraud_type:
  name: "all"
  label_column: "label"

dates:
  train_start: "2024-01-01"
  train_end: "2024-09-30"
  val_start: "2024-10-01"
  val_end: "2024-11-30"
  oot_start: "2024-12-01"
  oot_end: "2025-01-31"

metrics:
  target_recall: 0.80
  composite_weights:
    auprc: 0.50
    precision_at_recall: 0.25
    psi_penalty: 0.10
    train_val_psi_penalty: 0.05
    ci_width_penalty: 0.05
    auroc_gap_penalty: 0.05
  psi_threshold: 0.20
  psi_hard_reject: 0.25
  train_val_psi_threshold: 0.10
  train_val_psi_max: 0.20
  ci_width_threshold: 0.02
  ci_width_max: 0.06
  auroc_gap_threshold: 0.03
  auroc_gap_max: 0.15
  min_improvement: 0.001

validation:
  max_nan_rate: 0.50
  max_feature_explosion: 5.0
  max_feature_count: 300
  max_correlation: 0.98

execution:
  timeout_seconds: 900

# Dataset profile — agent reads this to adapt strategy
dataset_profile:
  fraud_rate: 0.035
  n_rows: 590000
  n_raw_features: 55
  has_geo: false
  has_identity: true          # id_01-id_38, DeviceType, DeviceInfo
  has_temporal: true           # TransactionDT (seconds from reference)
  has_email: true              # P_emaildomain, R_emaildomain
  population_shift: low        # OOT fraud rate stable (3.52% -> 3.48%)
  key_entity_col: "card1"     # Primary card/customer identifier
  time_col: "TransactionDT"
  amt_col: "TransactionAmt"
  recommended_te_smoothing:
    min_samples: 50
    smoothing_width: 20
